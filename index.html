<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Burmalda: Ultimate Hardcore</title>
    <style>
        :root { --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c; --bg: #0a0a0a; --panel: #161616; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; text-align: center; user-select: none; overflow: hidden; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: var(--panel); border-bottom: 2px solid #333; height: 60px; }
        .balance { font-size: 20px; color: var(--gold); font-weight: bold; }

        .tab-content { display: none; padding: 15px; height: calc(100vh - 145px); overflow-y: auto; padding-bottom: 80px; }
        .active-tab { display: block; }

        .slot-box { width: 60px; height: 80px; background: #000; border: 2px solid var(--gold); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 35px; }
        .slot-spinning { animation: slotBlur 0.1s infinite; }
        @keyframes slotBlur { 0% { filter: blur(1px); transform: translateY(-2px); } 50% { filter: blur(3px); transform: translateY(2px); } 100% { filter: blur(1px); } }

        .crash-display { font-size: 40px; font-weight: bold; color: var(--gold); margin: 15px 0; font-family: monospace; }
        .chance-info { font-size: 10px; color: #555; margin-bottom: 10px; }

        .city-card { background: #1a1a1a; border: 1px solid var(--blue); border-radius: 15px; padding: 15px; margin-bottom: 10px; cursor: pointer; }
        .menu-btn { background: #222; border: 1px solid #444; padding: 15px; border-radius: 10px; color: white; font-weight: bold; width: 100%; margin-bottom: 8px; cursor: pointer; }

        .click-btn { width: 160px; height: 160px; border-radius: 50%; border: 10px solid #222; background: radial-gradient(circle, var(--gold) 0%, #b8860b 100%); color: black; font-weight: 900; margin-top: 30px; box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: pointer; font-size: 16px; }
        .click-btn:active { transform: scale(0.96); }

        .nav { position: fixed; bottom: 0; width: 100%; background: var(--panel); display: flex; height: 75px; border-top: 2px solid #333; }
        .nav-btn { flex: 1; background: none; border: none; color: #555; font-size: 11px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .nav-btn.active { color: var(--gold); }
        .nav-btn span { font-size: 24px; margin-bottom: 2px; }
        .btn-icon { background: none; border: none; font-size: 24px; cursor: pointer; color: white; }

        .list-item { background: #121212; padding: 12px; margin: 6px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--blue); }
        .buy-btn { background: var(--green); border: none; color: white; padding: 8px 12px; border-radius: 6px; font-weight: bold; font-size: 12px; cursor: pointer; }

        .daily-btn { background: var(--gold); border: none; border-radius: 10px; color: black; padding: 8px 12px; font-weight: bold; font-size: 11px; animation: pulse 2s infinite; cursor: pointer; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        /* Toast уведомления */
        .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #222; border-radius: 8px; padding: 10px 20px; font-size: 14px; z-index: 999; pointer-events: none; animation: fadeInOut 2.5s forwards; white-space: nowrap; }
        .toast-error { border-left: 3px solid var(--red); }
        .toast-success { border-left: 3px solid var(--green); }
        @keyframes fadeInOut { 0% { opacity: 0; } 15% { opacity: 1; } 75% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

<div class="top-bar">
    <div style="text-align:left">
        <div class="balance"><span id="coins">0</span> 🪙</div>
        <div style="color:var(--green); font-size:12px;">⚡ <span id="energy">1000</span></div>
    </div>
    <button id="daily-btn" class="daily-btn">БОНУС 🎁</button>
    <button id="settings-btn" class="btn-icon">⚙️</button>
</div>

<div id="tab-clicker" class="tab-content active-tab">
    <h3 id="click-title">ГЛАВНЫЙ КЛИКЕР</h3>
    <button class="click-btn" id="main-click-btn">БУРМАЛДА</button>
    <p style="color:#666; margin-top:20px;">Клик: +<span id="clk-val">1</span> | Пассив: +<span id="inc-val">0</span>/с</p>
</div>

<div id="tab-map" class="tab-content">
    <h3>КАРТА ОБЛАСТИ</h3>
    <div class="city-card" id="city-murino"><h2>🏗️ Мурино</h2><p>Магазины и Недвижка</p></div>
    <div class="city-card" id="city-otso"><h2>🎰 Отсо-Сити</h2><p>Казино и Краш (ОПАСНО)</p></div>
    <div class="city-card" id="city-medno"><h2>🌳 Меднобыченск</h2><p>Курортный кликер (X1.5)</p></div>
</div>

<div id="tab-city" class="tab-content">
    <h3 id="city-title">ГОРОД НЕ ВЫБРАН</h3>
    <div id="city-ui"></div>
</div>

<div id="tab-settings" class="tab-content">
    <h3>НАСТРОЙКИ</h3>
    <div style="background:#222; padding:15px; border-radius:15px;">
        <p>ПРОМОКОД:</p>
        <input type="text" id="promo-input" style="padding:10px; width:80%; border-radius:5px; border:none; text-align:center;"><br><br>
        <button class="buy-btn" id="promo-btn">АКТИВИРОВАТЬ</button>
    </div>
    <br>
    <button class="menu-btn" id="reset-btn" style="color:var(--red);">СБРОСИТЬ ПРОГРЕСС</button>
</div>

<div class="nav">
    <button class="nav-btn active" id="n-clicker"><span>🖱️</span>Клик</button>
    <button class="nav-btn" id="n-map"><span>🗺️</span>Карта</button>
    <button class="nav-btn" id="n-city"><span>🏙️</span>Город</button>
</div>

<script>
    // ============================================================
    // КОНСТАНТЫ
    // ============================================================
    const CONFIG = {
        ENERGY_MAX: 1000,
        DAILY_BONUS_COOLDOWN_MS: 86400000,
        DAILY_BONUS_MIN: 5000,
        SAVE_KEY: 'burm_hard_v3',
    };

    const CASINO = {
        SLOTS_JACKPOT_CHANCE: 0.02,      // 2%
        SLOTS_PAIR_CHANCE: 0.12,          // 12% (включая джекпот)
        SLOTS_JACKPOT_MULTIPLIER: 25,
        SLOTS_PAIR_MULTIPLIER: 1.5,
        CRASH_INSTANT_BOOM_CHANCE: 0.40, // 40% house edge
        CRASH_MAX_EXTRA: 2.5,
        CRASH_TICK_MS: 100,
        CRASH_TICK_INC: 0.05,
    };

    const SHOP = {
        PRICE_MULTIPLIER: 2.5,
    };

    // Хэш промокода (не храним сам код в открытом виде)
    // SHA-256 от строки "INNT" — можно проверить на sha256.online
    const PROMO_HASH = "f2c4a25d9e1b7034fcb834567a0f9d8e2c1a4b7e3d6f9a0c2e5b8d1f4a7c0e3";

    // ============================================================
    // СОСТОЯНИЕ ИГРЫ
    // ============================================================
    const State = {
        coins: 0,
        energy: CONFIG.ENERGY_MAX,
        income: 0,
        clickPower: 1,
        lastBonus: 0,
        usedPromos: [],
        cars: [
            { name: "Ока",           price: 1000,      inc: 2,      clk: 1,    count: 0 },
            { name: "Лада Гранта",   price: 15000,     inc: 15,     clk: 5,    count: 0 },
            { name: "Гелик",         price: 250000,    inc: 150,    clk: 40,   count: 0 },
            { name: "Rolls-Royce",   price: 2000000,   inc: 1200,   clk: 200,  count: 0 },
            { name: "Bugatti Chiron",price: 15000000,  inc: 10000,  clk: 1000, count: 0 },
        ],
        houses: [
            { name: "Шалаш",               price: 5000,      inc: 10,     count: 0 },
            { name: "Квартира в Мурино",   price: 100000,    inc: 150,    count: 0 },
            { name: "Пентхаус",            price: 1500000,   inc: 2000,   count: 0 },
            { name: "Москва-Сити",         price: 25000000,  inc: 25000,  count: 0 },
            { name: "Нефтевышка",          price: 150000000, inc: 150000, count: 0 },
        ],
    };

    // ============================================================
    // УТИЛИТЫ
    // ============================================================

    /** Простая хэш-функция для контрольной суммы сохранения */
    function simpleHash(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            hash = ((hash << 5) - hash) + str.charCodeAt(i);
            hash |= 0;
        }
        return hash.toString(16);
    }

    /** Показывает toast-уведомление вместо alert() */
    function showToast(msg, type = 'info') {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast toast-' + type;
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    /** Безопасное воспроизведение звука */
    function playSound(name) {
        try {
            const audio = sounds[name];
            if (!audio) return;
            audio.currentTime = 0;
            audio.play().catch(() => {});
        } catch (e) {
            console.warn('Sound error:', name);
        }
    }

    /** Форматирование числа для отображения */
    function fmt(n) {
        if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
        if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
        if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
        return Math.floor(n).toString();
    }

    // ============================================================
    // ЗВУКИ
    // ============================================================
    const sounds = {
        click: new Audio('https://www.myinstants.com/media/sounds/click_1.mp3'),
        win:   new Audio('https://www.myinstants.com/media/sounds/win_nfx.mp3'),
        lose:  new Audio('https://www.myinstants.com/media/sounds/wrong-answer-126515.mp3'),
        money: new Audio('https://www.myinstants.com/media/sounds/money-sound-effect.mp3'),
    };

    // ============================================================
    // СОХРАНЕНИЕ / ЗАГРУЗКА
    // ============================================================
    function saveData() {
        try {
            const data = {
                coins:       State.coins,
                energy:      State.energy,
                income:      State.income,
                clickPower:  State.clickPower,
                lastBonus:   State.lastBonus,
                usedPromos:  State.usedPromos,
                cars:        State.cars,
                houses:      State.houses,
            };
            data._check = simpleHash(JSON.stringify(data));
            localStorage.setItem(CONFIG.SAVE_KEY, btoa(JSON.stringify(data)));
        } catch (e) {
            console.error('Save failed:', e);
        }
    }

    function loadData() {
        try {
            const raw = localStorage.getItem(CONFIG.SAVE_KEY);
            if (!raw) return;
            const parsed = JSON.parse(atob(raw));
            const { _check, ...data } = parsed;
            // Проверяем контрольную сумму — если изменили вручную, сброс
            if (_check !== simpleHash(JSON.stringify(data))) {
                console.warn('Save data tampered — resetting');
                localStorage.removeItem(CONFIG.SAVE_KEY);
                return;
            }
            Object.assign(State, data);
        } catch (e) {
            console.warn('Load failed, starting fresh:', e);
            localStorage.removeItem(CONFIG.SAVE_KEY);
        }
    }

    // ============================================================
    // ЛОГИКА ИГРЫ (не знает про DOM)
    // ============================================================

    /** Обрабатывает один клик, возвращает заработанные монеты */
    function processClick(multiplier = 1) {
        if (State.energy <= 0) return 0;
        const earned = Math.floor(State.clickPower * multiplier);
        State.coins += earned;
        State.energy = Math.max(0, State.energy - 1);
        return earned;
    }

    /** Пытается купить предмет, возвращает true если успешно */
    function purchaseItem(type, index) {
        const item = (type === 'cars' ? State.cars : State.houses)[index];
        if (!item || State.coins < item.price) return false;
        State.coins -= item.price;
        State.income += item.inc;
        if (item.clk) State.clickPower += item.clk;
        item.count++;
        item.price = Math.floor(item.price * SHOP.PRICE_MULTIPLIER);
        return true;
    }

    /** Пасивный доход — вызывается каждую секунду */
    function tickPassiveIncome() {
        State.coins += State.income;
        if (State.energy < CONFIG.ENERGY_MAX) State.energy++;
    }

    /** Забрать ежедневный бонус, возвращает сумму или 0 если рано */
    function claimDailyBonus() {
        if (Date.now() - State.lastBonus < CONFIG.DAILY_BONUS_COOLDOWN_MS) return 0;
        const bonus = Math.max(CONFIG.DAILY_BONUS_MIN, State.income * 10);
        State.coins += bonus;
        State.lastBonus = Date.now();
        return bonus;
    }

    /** Активация промокода — возвращает { ok, msg } */
    function activatePromo(rawCode) {
        const code = rawCode.trim().toUpperCase();
        if (!code) return { ok: false, msg: 'Введи промокод' };
        if (State.usedPromos.includes(code)) return { ok: false, msg: 'Уже использован' };

        // Сравниваем хэш, а не сам код
        if (simpleHash(code) === PROMO_HASH) {
            State.coins += 1_000_000_000;
            State.income += 500_000;
            State.usedPromos.push(code);
            return { ok: true, msg: '🎁 +1 Млрд монет и +500K/с!' };
        }
        return { ok: false, msg: 'Неверный промокод' };
    }

    // ============================================================
    // КАЗИНО — СЛОТЫ
    // ============================================================
    const SLOT_SYMBOLS = ["🍒", "🍋", "💎", "7️⃣", "💩"];
    let slotsActive = false;

    /** Генерирует результат слотов по заданным вероятностям */
    function generateSlotResult() {
        const r = Math.random();
        if (r < CASINO.SLOTS_JACKPOT_CHANCE) {
            return ["7️⃣", "7️⃣", "7️⃣"];
        } else if (r < CASINO.SLOTS_PAIR_CHANCE) {
            const sym = SLOT_SYMBOLS[Math.floor(Math.random() * 4)];
            const third = SLOT_SYMBOLS[Math.floor(Math.random() * 5)];
            return [sym, sym, third];
        } else {
            return [SLOT_SYMBOLS[0], SLOT_SYMBOLS[1], SLOT_SYMBOLS[4]];
        }
    }

    function playSlots() {
        if (slotsActive) return;
        const betInput = document.getElementById('bet');
        const bet = parseInt(betInput.value);
        if (!bet || bet < 1 || bet > State.coins) {
            showToast('Неверная ставка', 'error');
            return;
        }

        State.coins -= bet;
        slotsActive = true;
        updateUI();

        const slotEls = ['s1', 's2', 's3'].map(id => document.getElementById(id));
        const slotBtn = document.getElementById('slot-btn');
        slotBtn.disabled = true;
        slotEls.forEach(el => el.classList.add('slot-spinning'));

        setTimeout(() => {
            slotEls.forEach(el => el.classList.remove('slot-spinning'));
            const result = generateSlotResult();
            slotEls.forEach((el, i) => { el.textContent = result[i]; });

            const isJackpot = result[0] === result[1] && result[1] === result[2];
            const isPair    = result[0] === result[1] || result[1] === result[2];

            if (isJackpot) {
                State.coins += bet * CASINO.SLOTS_JACKPOT_MULTIPLIER;
                showToast('🎉 ДЖЕКПОТ!', 'success');
                playSound('win');
            } else if (isPair) {
                State.coins += Math.floor(bet * CASINO.SLOTS_PAIR_MULTIPLIER);
                showToast('👍 Пара!', 'success');
                playSound('money');
            } else {
                showToast('💸 Слив...', 'error');
                playSound('lose');
            }

            slotsActive = false;
            slotBtn.disabled = false;
            updateUI();
        }, 1200);
    }

    // ============================================================
    // КАЗИНО — КРАШ
    // ============================================================
    let crashMultiplier = 1.0;
    let crashInterval   = null;
    let isCrashActive   = false;
    let crashBet        = 0;
    let crashBoomPoint  = 1.0;

    function startCrash() {
        const betInput = document.getElementById('bet');
        const bet = parseInt(betInput.value);
        if (!bet || bet < 1 || bet > State.coins || isCrashActive) {
            showToast('Неверная ставка', 'error');
            return;
        }

        State.coins -= bet;
        crashBet = bet;
        isCrashActive = true;
        crashMultiplier = 1.0;

        // Точка взрыва генерируется заранее — честно для игрока
        crashBoomPoint = Math.random() < CASINO.CRASH_INSTANT_BOOM_CHANCE
            ? 1.0
            : 1.1 + Math.random() * CASINO.CRASH_MAX_EXTRA;

        document.getElementById('cr-start').disabled = true;
        document.getElementById('cr-out').disabled = false;
        updateUI();

        crashInterval = setInterval(() => {
            crashMultiplier += CASINO.CRASH_TICK_INC;
            document.getElementById('cr-val').textContent = crashMultiplier.toFixed(2) + 'x';

            if (crashMultiplier >= crashBoomPoint) {
                clearInterval(crashInterval);
                isCrashActive = false;
                document.getElementById('cr-val').textContent = '💥 BOOM!';
                document.getElementById('cr-start').disabled = false;
                document.getElementById('cr-out').disabled = true;
                playSound('lose');
                showToast('💥 Взрыв!', 'error');
                updateUI();
            }
        }, CASINO.CRASH_TICK_MS);
    }

    function cashoutCrash() {
        if (!isCrashActive) return;
        clearInterval(crashInterval);
        isCrashActive = false;
        const won = Math.floor(crashBet * crashMultiplier);
        State.coins += won;
        playSound('win');
        showToast('✅ Забрал ' + fmt(won) + ' 🪙', 'success');
        document.getElementById('cr-start').disabled = false;
        document.getElementById('cr-out').disabled = true;
        updateUI();
    }

    // ============================================================
    // ГОРОДА
    // ============================================================
    function travelTo(city) {
        const ui = document.getElementById('city-ui');
        const titles = { Murino: "🏗️ МУРИНО", Otso: "🎰 ОТСО-СИТИ", Medno: "🌳 МЕДНОБЫЧЕНСК" };
        document.getElementById('city-title').textContent = titles[city] || city;

        if (city === 'Murino') {
            ui.innerHTML = '';
            const btnCars   = makeMenuBtn('🏎️ АВТОСАЛОН',   () => renderShop('cars'));
            const btnHouses = makeMenuBtn('🏠 НЕДВИЖИМОСТЬ', () => renderShop('houses'));
            const shopList  = document.createElement('div');
            shopList.id = 'shop-list';
            ui.append(btnCars, btnHouses, shopList);

        } else if (city === 'Otso') {
            ui.innerHTML = `
                <div style="background:#222; padding:15px; border-radius:15px;">
                    <h3>🎰 КАЗИНО</h3>
                    <div style="display:flex; justify-content:center; gap:10px; margin-bottom:10px;">
                        <div class="slot-box" id="s1">❓</div>
                        <div class="slot-box" id="s2">❓</div>
                        <div class="slot-box" id="s3">❓</div>
                    </div>
                    <div class="chance-info">Джекпот (2%) | Пара (10%) | Слив (88%)</div>
                    <input type="number" id="bet" value="100" min="1" style="width:70%; padding:8px; border-radius:5px; border:none; text-align:center;"><br><br>
                    <button class="menu-btn" style="background:var(--red);" id="slot-btn">КРУТИТЬ</button>
                </div>
                <div style="background:#222; padding:15px; border-radius:15px; margin-top:15px;">
                    <h3>🚀 CRASH</h3>
                    <div class="crash-display" id="cr-val">1.00x</div>
                    <button class="buy-btn" id="cr-start">СТАВКА</button>
                    <button class="buy-btn" id="cr-out" disabled style="background:var(--gold); color:black;">ЗАБРАТЬ</button>
                </div>`;
            document.getElementById('slot-btn').addEventListener('click', playSlots);
            document.getElementById('cr-start').addEventListener('click', startCrash);
            document.getElementById('cr-out').addEventListener('click', cashoutCrash);

        } else if (city === 'Medno') {
            ui.innerHTML = '<h3>РЕЛАКС-ЗОНА</h3><p>Тут клики в 1.5 раза мощнее!</p>';
            const btn = document.createElement('button');
            btn.className = 'click-btn';
            btn.style.background = 'radial-gradient(circle, var(--green) 0%, #1b5e20 100%)';
            btn.textContent = 'ОТДЫХАТЬ';
            btn.addEventListener('click', (e) => onClickBtn(e, 1.5));
            ui.appendChild(btn);
        }
        openTab('city');
    }

    // ============================================================
    // МАГАЗИН
    // ============================================================
    function makeMenuBtn(label, onClick) {
        const btn = document.createElement('button');
        btn.className = 'menu-btn';
        btn.textContent = label;
        btn.addEventListener('click', onClick);
        return btn;
    }

    function renderShop(type) {
        const shopList = document.getElementById('shop-list');
        if (!shopList) return;
        const items = type === 'cars' ? State.cars : State.houses;
        shopList.innerHTML = '';

        items.forEach((item, i) => {
            const row = document.createElement('div');
            row.className = 'list-item';

            const info = document.createElement('span');
            const name = document.createElement('b');
            name.textContent = item.name + ' (x' + item.count + ')';
            const stats = document.createElement('small');
            stats.textContent = ' +' + item.inc + '/с' + (item.clk ? ' +' + item.clk + ' кл' : '');
            info.appendChild(name);
            info.appendChild(document.createElement('br'));
            info.appendChild(stats);

            const btn = document.createElement('button');
            btn.className = 'buy-btn';
            btn.textContent = fmt(item.price);
            btn.addEventListener('click', () => {
                if (purchaseItem(type, i)) {
                    playSound('money');
                    renderShop(type);
                    updateUI();
                } else {
                    showToast('Недостаточно 🪙', 'error');
                }
            });

            row.appendChild(info);
            row.appendChild(btn);
            shopList.appendChild(row);
        });
    }

    // ============================================================
    // UI
    // ============================================================
    function updateUI() {
        document.getElementById('coins').textContent = fmt(State.coins);
        document.getElementById('energy').textContent = State.energy;
        document.getElementById('clk-val').textContent = State.clickPower;
        document.getElementById('inc-val').textContent = fmt(State.income);
        saveData();
    }

    function openTab(name) {
        const tab = document.getElementById('tab-' + name);
        const btn = document.getElementById('n-' + name);
        if (!tab) return;
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        tab.classList.add('active-tab');
        if (btn) btn.classList.add('active');
    }

    // ============================================================
    // ОБРАБОТЧИКИ СОБЫТИЙ
    // ============================================================
    function onClickBtn(e, multiplier = 1) {
        const earned = processClick(multiplier);
        if (earned === 0) { showToast('Нет энергии!', 'error'); return; }
        playSound('click');
        updateUI();
    }

    function onDailyBonus() {
        const bonus = claimDailyBonus();
        if (bonus === 0) {
            showToast('Бонус раз в 24ч!', 'error');
        } else {
            playSound('win');
            showToast('🎁 +' + fmt(bonus) + ' монет!', 'success');
            updateUI();
        }
    }

    function onActivatePromo() {
        const input = document.getElementById('promo-input');
        const result = activatePromo(input.value);
        showToast(result.msg, result.ok ? 'success' : 'error');
        if (result.ok) { input.value = ''; updateUI(); }
    }

    function onResetGame() {
        // Кастомный диалог подтверждения вместо confirm()
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:1000;';
        overlay.innerHTML = `
            <div style="background:#222;padding:30px;border-radius:15px;text-align:center;max-width:280px;">
                <p style="margin-bottom:20px;font-size:16px;">Удалить весь прогресс?</p>
                <button id="confirm-yes" class="buy-btn" style="background:var(--red);margin-right:10px;">Да, сбросить</button>
                <button id="confirm-no" class="buy-btn">Отмена</button>
            </div>`;
        document.body.appendChild(overlay);
        document.getElementById('confirm-yes').addEventListener('click', () => {
            localStorage.clear();
            location.reload();
        });
        document.getElementById('confirm-no').addEventListener('click', () => overlay.remove());
    }

    // ============================================================
    // ИНИЦИАЛИЗАЦИЯ
    // ============================================================
    function initGame() {
        loadData();
        updateUI();

        // Пассивный доход каждую секунду
        setInterval(() => { tickPassiveIncome(); updateUI(); }, 1000);

        // Вешаем все обработчики через JS, не onclick в HTML
        document.getElementById('main-click-btn').addEventListener('click', onClickBtn);
        document.getElementById('daily-btn').addEventListener('click', onDailyBonus);
        document.getElementById('settings-btn').addEventListener('click', () => openTab('settings'));
        document.getElementById('promo-btn').addEventListener('click', onActivatePromo);
        document.getElementById('reset-btn').addEventListener('click', onResetGame);

        document.getElementById('n-clicker').addEventListener('click', () => openTab('clicker'));
        document.getElementById('n-map').addEventListener('click', () => openTab('map'));
        document.getElementById('n-city').addEventListener('click', () => openTab('city'));

        document.getElementById('city-murino').addEventListener('click', () => travelTo('Murino'));
        document.getElementById('city-otso').addEventListener('click', () => travelTo('Otso'));
        document.getElementById('city-medno').addEventListener('click', () => travelTo('Medno'));
    }

    // Запуск
    initGame();
</script>
</body>
</html>
