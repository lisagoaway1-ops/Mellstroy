<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Burmalda: Deluxe Edition</title>
    <style>
        :root { --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c; --bg: #0a0a0a; --panel: #161616; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; text-align: center; user-select: none; overflow: hidden; }
        
        /* ВЕРХНЯЯ ПАНЕЛЬ */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: var(--panel); border-bottom: 2px solid #333; height: 60px; }
        .balance-area { text-align: left; }
        .balance { font-size: 20px; color: var(--gold); font-weight: bold; }
        
        /* КНОПКА ЕЖЕДНЕВНОГО БОНУСА */
        .daily-btn { 
            background: linear-gradient(45deg, #f1c40f, #d4ac0d); 
            border: none; border-radius: 12px; color: black; font-weight: bold; 
            padding: 8px 15px; font-size: 12px; cursor: pointer;
            animation: pulse 1.5s infinite; box-shadow: 0 0 15px rgba(241, 196, 15, 0.4);
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); box-shadow: 0 0 25px rgba(241, 196, 15, 0.7); } 100% { transform: scale(1); } }
        .daily-btn.disabled { background: #333; color: #777; animation: none; box-shadow: none; opacity: 0.6; }

        .tab-content { display: none; padding: 15px; height: calc(100vh - 150px); overflow-y: auto; padding-bottom: 80px; }
        .active-tab { display: block; }

        /* АНИМАЦИЯ СЛОТОВ */
        .slot-box { 
            width: 60px; height: 80px; background: #000; border: 2px solid var(--gold); 
            border-radius: 10px; display: flex; align-items: center; justify-content: center; 
            font-size: 35px; transition: 0.1s;
        }
        .slot-spinning { animation: slotBlur 0.1s infinite; }
        @keyframes slotBlur { 0% { transform: translateY(-2px); filter: blur(1px); } 50% { transform: translateY(2px); filter: blur(2px); } 100% { transform: translateY(-2px); } }

        /* ГОРОДА */
        .city-card { background: #222; border: 2px solid var(--blue); border-radius: 15px; padding: 15px; margin-bottom: 12px; }
        .menu-btn { background: var(--panel); border: 1px solid #444; padding: 15px; border-radius: 10px; color: white; font-weight: bold; width: 100%; margin-bottom: 10px; }
        .game-card { background: var(--panel); padding: 15px; border-radius: 18px; border: 1px solid #333; margin-top: 10px; }
        
        .click-btn { width: 160px; height: 160px; border-radius: 50%; border: 8px solid #222; background: radial-gradient(circle, var(--gold) 0%, #d4ac0d 100%); color: black; font-weight: 900; margin-top: 30px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--panel); display: flex; height: 70px; border-top: 2px solid #333; }
        .nav-btn { flex: 1; background: none; border: none; color: #555; font-size: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .nav-btn.active { color: var(--gold); }
        .list-item { background: #1a1a1a; padding: 12px; margin: 5px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--blue); }
        .buy-btn { background: var(--green); border: none; color: white; padding: 8px 12px; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body onload="initGame()">

<div class="top-bar">
    <div class="balance-area">
        <div class="balance"><span id="coins">0</span> 🪙</div>
        <div style="color:var(--green); font-size:12px;">⚡ <span id="energy">1000</span></div>
    </div>
    <button id="daily-bonus-btn" class="daily-btn" onclick="takeDailyBonus()">БОНУС 🎁</button>
    <div style="display:flex; gap:10px;">
        <button onclick="openTab('profile')" style="background:none; border:none; font-size:20px;">👤</button>
    </div>
</div>

<div id="tab-clicker" class="tab-content active-tab">
    <button class="click-btn" onclick="makeClick(event)">БУРМАЛДА</button>
    <p style="color:#666; margin-top:20px;">Доход: <span id="inc-val">0</span>/с | Клик: <span id="clk-val">1</span></p>
</div>

<div id="tab-map" class="tab-content">
    <h3>КАРТА</h3>
    <div class="city-card" onclick="travelTo('Murino')"><h2>🏗️ Мурино</h2><p>Бизнес и Недвижка</p></div>
    <div class="city-card" onclick="travelTo('Otso')"><h2>🎰 Отсо-Сити</h2><p>Казино и Краш</p></div>
</div>

<div id="tab-city" class="tab-content">
    <h3 id="city-title">ВЫБЕРИТЕ ГОРОД</h3>
    <div id="city-ui"></div>
</div>

<div id="tab-profile" class="tab-content">
    <h3>ПРОФИЛЬ</h3>
    <div class="game-card">
        <p>Всего добыто: <span id="prof-total">0</span> 🪙</p>
        <button class="buy-btn" style="background:var(--red); width:100%;" onclick="resetGame()">СБРОСИТЬ ПРОГРЕСС</button>
    </div>
</div>

<div class="nav">
    <button class="nav-btn active" id="n-clicker" onclick="openTab('clicker')"><span>🖱️</span>Клик</button>
    <button class="nav-btn" id="n-map" onclick="openTab('map')"><span>🗺️</span>Карта</button>
    <button class="nav-btn" id="n-city" onclick="openTab('city')"><span>🏙️</span>Город</button>
</div>

<script>
    let coins = 0, energy = 1000, income = 0, clickPower = 1, totalEarned = 0, lastBonusTime = 0;
    const snd = { 
        click: new Audio('click.mp3'), win: new Audio('win.mp3'), lose: new Audio('loss.mp3'), 
        jackpot: new Audio('jackpot.mp3'), music: new Audio('music.mp3') 
    };
    snd.music.loop = true;

    let cars = [{ name: "Ока", price: 500, click: 2, inc: 1, count: 0 }, { name: "Жигули", price: 5000, click: 10, inc: 5, count: 0 }, { name: "BMW M5", price: 80000, click: 50, inc: 40, count: 0 }];
    let houses = [{ name: "Будка", price: 2000, inc: 10, count: 0 }, { name: "Вилла", price: 500000, inc: 600, count: 0 }, { name: "Нефтевышка", price: 50000000, inc: 25000, count: 0 }];

    function initGame() {
        loadData(); updateUI(); checkBonusStatus();
        setInterval(() => { coins += income; totalEarned += income; if(energy < 1000) energy++; updateUI(); checkBonusStatus(); }, 1000);
    }

    // ЕЖЕДНЕВНЫЙ БОНУС
    function checkBonusStatus() {
        const btn = document.getElementById('daily-bonus-btn');
        const now = Date.now();
        if (now - lastBonusTime > 86400000) {
            btn.classList.remove('disabled');
            btn.innerText = "БОНУС 🎁";
        } else {
            btn.classList.add('disabled');
            let remaining = 86400000 - (now - lastBonusTime);
            let hours = Math.floor(remaining / 3600000);
            btn.innerText = hours + "ч";
        }
    }

    function takeDailyBonus() {
        const now = Date.now();
        if (now - lastBonusTime < 86400000) return;
        let bonus = Math.max(5000, income * 500);
        coins += bonus; lastBonusTime = now;
        if(document.getElementById('set-sound')?.checked !== false) snd.win.play();
        alert("🎁 Ежедневный бонус: " + bonus + " 🪙");
        updateUI();
    }

    function travelTo(city) {
        const ui = document.getElementById('city-ui');
        document.getElementById('city-title').innerText = (city === 'Murino' ? "🏗️ МУРИНО" : "🎰 ОТСО-СИТИ");
        if(city === 'Murino') {
            ui.innerHTML = `<button class="menu-btn" onclick="renderShop('cars')">🏎️ АВТОСАЛОН</button><button class="menu-btn" onclick="renderShop('houses')">🏠 НЕДВИЖИМОСТЬ</button><div id="shop-list"></div>`;
        } else {
            ui.innerHTML = `
                <div class="game-card">
                    <h3>🎰 КАЗИНО</h3>
                    <div class="slot-container">
                        <div class="slot-box" id="s1">🍒</div><div class="slot-box" id="s2">🍒</div><div class="slot-box" id="s3">🍒</div>
                    </div>
                    <input type="number" id="slot-bet" value="100" style="margin: 10px 0; padding: 10px; width: 80%; border-radius: 5px; border: none;">
                    <button class="buy-btn" style="width:100%; background:var(--red);" id="slot-btn" onclick="playSlots()">КРУТИТЬ</button>
                </div>`;
        }
        openTab('city');
    }

    function renderShop(type) {
        const list = document.getElementById('shop-list');
        let items = type === 'cars' ? cars : houses;
        list.innerHTML = items.map((item, i) => `<div class="list-item"><span><b>${item.name}</b> (x${item.count})</span><button class="buy-btn" onclick="buyItem('${type}', ${i})">${Math.floor(item.price)}</button></div>`).join('');
    }

    function buyItem(type, i) {
        let item = (type === 'cars' ? cars[i] : houses[i]);
        if(coins >= item.price) {
            coins -= item.price; income += item.inc; if(item.click) clickPower += item.click;
            item.count++; item.price *= 2.3;
            snd.win.play(); renderShop(type); updateUI();
        }
    }

    // СЛОТЫ С УЛУЧШЕННЫМ ШАНСОМ И АНИМАЦИЕЙ
    function playSlots() {
        let bet = parseInt(document.getElementById('slot-bet').value);
        if(bet > coins || bet < 1) return;
        coins -= bet; document.getElementById('slot-btn').disabled = true;
        
        const s1 = document.getElementById('s1'), s2 = document.getElementById('s2'), s3 = document.getElementById('s3');
        s1.classList.add('slot-spinning'); s2.classList.add('slot-spinning'); s3.classList.add('slot-spinning');

        setTimeout(() => {
            s1.classList.remove('slot-spinning');
            s2.classList.remove('slot-spinning');
            s3.classList.remove('slot-spinning');
            
            let symbols = ["🍒", "🍋", "💎", "7️⃣"];
            let r;
            let chance = Math.random();
            
            if(chance < 0.10) r = ["7️⃣", "7️⃣", "7️⃣"]; // Джекпот 10%
            else if(chance < 0.35) { // Пара 25%
                let sym = symbols[Math.floor(Math.random()*4)];
                r = [sym, sym, symbols[Math.floor(Math.random()*4)]];
            } else { // Рандом
                r = [symbols[Math.floor(Math.random()*4)], symbols[Math.floor(Math.random()*4)], symbols[Math.floor(Math.random()*4)]];
            }

            s1.innerText = r[0]; s2.innerText = r[1]; s3.innerText = r[2];

            if(r[0]===r[1] && r[1]===r[2]) { coins += bet*15; snd.jackpot.play(); }
            else if(r[0]===r[1] || r[1]===r[2] || r[0]===r[2]) { coins += Math.floor(bet*1.5); snd.win.play(); }
            else snd.lose.play();

            document.getElementById('slot-btn').disabled = false; updateUI();
        }, 1200);
    }

    function makeClick(e) {
        if(energy <= 0) return;
        coins += clickPower; energy--; totalEarned += clickPower;
        snd.click.currentTime = 0; snd.click.play();
        if(!musicStarted) { snd.music.play(); musicStarted = true; }
        updateUI();
    }

    function openTab(name) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + name).classList.add('active-tab');
        document.getElementById('n-' + name).classList.add('active');
    }

    function updateUI() {
        document.getElementById('coins').innerText = Math.floor(coins);
        document.getElementById('energy').innerText = energy;
        document.getElementById('inc-val').innerText = income;
        document.getElementById('clk-val').innerText = clickPower;
        document.getElementById('prof-total').innerText = Math.floor(totalEarned);
        saveData();
    }

    function saveData() { localStorage.setItem('burmalda_deluxe_save', JSON.stringify({coins, income, clickPower, totalEarned, lastBonusTime, cars, houses})); }
    function loadData() {
        let d = JSON.parse(localStorage.getItem('burmalda_deluxe_save'));
        if(d) { coins=d.coins; income=d.income; clickPower=d.clickPower; totalEarned=d.totalEarned; lastBonusTime=d.lastBonusTime; cars=d.cars; houses=d.houses; }
    }
    function resetGame() { if(confirm("Сбросить всё?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
