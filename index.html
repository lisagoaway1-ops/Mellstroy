<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Burmalda: Social Edition</title>
    
    <style>
        :root { --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c; --bg: #0a0a0a; --panel: #161616; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; text-align: center; user-select: none; overflow: hidden; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: var(--panel); border-bottom: 2px solid #333; height: 60px; }
        .balance { font-size: 18px; color: var(--gold); font-weight: bold; }
        
        .tab-content { display: none; padding: 15px; height: calc(100vh - 150px); overflow-y: auto; padding-bottom: 80px; }
        .active-tab { display: block; }

        /* ЧАТ */
        #chat-box { height: 250px; background: #111; border-radius: 10px; overflow-y: auto; padding: 10px; text-align: left; border: 1px solid #333; margin-bottom: 10px; }
        .msg { margin-bottom: 8px; font-size: 13px; line-height: 1.4; }
        .msg b { color: var(--blue); }
        .chat-input-area { display: flex; gap: 5px; }

        /* КАЗИНО / БЛЕКДЖЕК */
        .card-area { background: #0e3d1a; padding: 15px; border-radius: 12px; margin: 10px 0; border: 2px solid #1a5e20; }
        .card-val { font-size: 20px; font-weight: bold; }

        /* ОБЩЕЕ */
        .click-btn { width: 150px; height: 150px; border-radius: 50%; border: 8px solid #222; background: radial-gradient(circle, var(--gold) 0%, #b8860b 100%); color: black; font-weight: 900; margin-top: 20px; cursor: pointer; }
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--panel); display: flex; height: 75px; border-top: 2px solid #333; }
        .nav-btn { flex: 1; background: none; border: none; color: #555; font-size: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .nav-btn.active { color: var(--gold); }
        .nav-btn span { font-size: 22px; }

        .leader-item { display: flex; justify-content: space-between; padding: 10px; background: #222; margin-bottom: 5px; border-radius: 8px; }
        .leader-item.me { border-left: 4px solid var(--green); }
        
        input { background: #222; color: white; border: 1px solid #444; padding: 10px; border-radius: 8px; width: 70%; }
        .buy-btn { background: var(--green); border: none; color: white; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="top-bar">
    <div style="text-align:left">
        <div class="balance"><span id="coins">0</span> 🪙</div>
        <div style="font-size:12px; color:var(--green)">⚡ <span id="energy">1000</span></div>
    </div>
    <div id="user-tag" style="font-size: 11px; color: #888;">...</div>
    <button onclick="openTab('settings')" style="background:none; border:none; font-size:20px; cursor:pointer;">⚙️</button>
</div>

<div id="tab-clicker" class="tab-content active-tab">
    <button class="click-btn" onclick="makeClick(event)">БУРМАЛДА</button>
    <p>Клик: +<span id="clk-val">1</span> | Доход: +<span id="inc-val">0</span>/с</p>
</div>

<div id="tab-map" class="tab-content">
    <h3>КАРТА</h3>
    <button style="width:100%; padding:20px; margin-bottom:10px; background:#222; color:white; border-radius:15px; border:1px solid var(--blue); cursor:pointer;" onclick="travelTo('Murino')">🏗️ МУРИНО (Магазин)</button>
    <button style="width:100%; padding:20px; background:#222; color:white; border-radius:15px; border:1px solid var(--red); cursor:pointer;" onclick="travelTo('Otso')">🎰 ОТСО-СИТИ (Блекджек)</button>
</div>

<div id="tab-city" class="tab-content">
    <h3 id="city-title">ГОРОД</h3>
    <div id="city-ui"></div>
</div>

<div id="tab-chat" class="tab-content">
    <h3>ГЛОБАЛЬНЫЙ ЧАТ</h3>
    <div id="chat-box"></div>
    <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="Сообщение...">
        <button class="buy-btn" onclick="sendMessage()">📡</button>
    </div>
</div>

<div id="tab-leaderboard" class="tab-content">
    <h3>🏆 ТОП ИГРОКОВ</h3>
    <div id="leader-list"></div>
</div>

<div id="tab-settings" class="tab-content">
    <h3>НАСТРОЙКИ</h3>
    <p>Никнейм:</p>
    <input type="text" id="name-input" maxlength="12">
    <button class="buy-btn" onclick="changeNickname()">ОК</button>
    <br><br>
    <button style="background:var(--red); border:none; color:white; padding:10px; border-radius:8px; cursor:pointer;" onclick="resetGame()">СБРОС ПРОГРЕССА</button>
</div>

<div class="nav">
    <button class="nav-btn active" id="n-clicker" onclick="openTab('clicker')"><span>🖱️</span>Клик</button>
    <button class="nav-btn" id="n-map" onclick="openTab('map')"><span>🗺️</span>Карта</button>
    <button class="nav-btn" id="n-chat" onclick="openTab('chat');"><span>💬</span>Чат</button>
    <button class="nav-btn" id="n-leaderboard" onclick="openTab('leaderboard');"><span>🏆</span>Топ</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, query, orderByChild, limitToLast, push, serverTimestamp, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDI5JrmS9DTC6ZPf2IpeQi4Z8fe-eZeSi0",
        authDomain: "burmalda-cc9e2.firebaseapp.com",
        databaseURL: "https://burmalda-cc9e2-default-rtdb.firebaseio.com",
        projectId: "burmalda-cc9e2",
        storageBucket: "burmalda-cc9e2.firebasestorage.app",
        messagingSenderId: "16974087709",
        appId: "1:16974087709:web:98efe6ee803de73360e8f4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let coins = Number(localStorage.getItem('coins')) || 0;
    let income = Number(localStorage.getItem('income')) || 0;
    let userId = localStorage.getItem('burmalda_uid') || "User_" + Math.floor(Math.random()*9999);
    localStorage.setItem('burmalda_uid', userId);

    // Локальная инициализация
    async function initGame() {
        document.getElementById('user-tag').innerText = userId;
        document.getElementById('name-input').value = userId;
        
        // Попытка загрузить данные из облака при старте
        const snapshot = await get(ref(db, 'users/' + userId));
        if (snapshot.exists()) {
            const data = snapshot.val();
            if (data.balance > coins) {
                coins = data.balance;
            }
        }

        updateUI();

        // Таймеры
        setInterval(() => {
            coins += income;
            updateUI();
        }, 1000);

        setInterval(syncStats, 10000); // Синхрон с базой каждые 10 сек
        listenChat();
        listenLeaderboard();
    }

    function updateUI() {
        document.getElementById('coins').innerText = Math.floor(coins);
        document.getElementById('inc-val').innerText = income;
        localStorage.setItem('coins', coins);
        localStorage.setItem('income', income);
    }

    function syncStats() {
        set(ref(db, 'users/' + userId), { 
            username: userId, 
            balance: Math.floor(coins),
            lastUpdate: serverTimestamp() 
        });
    }

    // Экспорт функций в Global Scope
    window.makeClick = () => { coins += 1; updateUI(); };

    window.sendMessage = () => {
        const input = document.getElementById('chat-input');
        if(!input.value.trim()) return;
        push(ref(db, 'chat'), {
            user: userId,
            text: input.value,
            time: serverTimestamp()
        });
        input.value = "";
    };

    window.changeNickname = () => {
        const newNick = document.getElementById('name-input').value.trim();
        if(!newNick) return;
        userId = newNick;
        localStorage.setItem('burmalda_uid', userId);
        document.getElementById('user-tag').innerText = userId;
        syncStats();
        alert("Ник изменен!");
    };

    window.openTab = (name) => {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        const targetTab = document.getElementById('tab-' + name);
        const targetBtn = document.getElementById('n-' + name);
        if(targetTab) targetTab.classList.add('active-tab');
        if(targetBtn) targetBtn.classList.add('active');
    };

    window.resetGame = () => { 
        if(confirm("Удалить всё? Это обнулит локальный прогресс.")) { 
            localStorage.clear(); 
            location.reload(); 
        } 
    };

    // Чат и Лидерборд
    function listenChat() {
        const chatBox = document.getElementById('chat-box');
        onValue(query(ref(db, 'chat'), limitToLast(20)), (snap) => {
            let html = "";
            snap.forEach(child => {
                const m = child.val();
                html += `<div class="msg"><b>${m.user}:</b> ${m.text}</div>`;
            });
            chatBox.innerHTML = html;
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    }

    function listenLeaderboard() {
        const list = document.getElementById('leader-list');
        onValue(query(ref(db, 'users'), orderByChild('balance'), limitToLast(10)), (snap) => {
            let players = [];
            snap.forEach(s => players.push(s.val()));
            players.sort((a,b) => b.balance - a.balance);
            list.innerHTML = players.map((p, i) => `
                <div class="leader-item ${p.username === userId ? 'me' : ''}">
                    <span>#${i+1} ${p.username}</span>
                    <b>${p.balance.toLocaleString()} 🪙</b>
                </div>
            `).join('');
        });
    }

    // Блэкджек и Города
    let pCards = [], dCards = [];
    window.travelTo = (city) => {
        const ui = document.getElementById('city-ui');
        const title = document.getElementById('city-title');
        title.innerText = city.toUpperCase();
        if(city === 'Otso') {
            ui.innerHTML = `
                <div class="card-area">
                    <p>Дилер: <span id="d-val">?</span></p>
                    <p>Вы: <span id="p-val">0</span></p>
                </div>
                <input type="number" id="bj-bet" value="100" style="margin-bottom:10px; width: 80%;">
                <div id="bj-controls">
                    <button class="buy-btn" onclick="startBJ()">ИГРАТЬ</button>
                </div>`;
        } else if(city === 'Murino') {
            ui.innerHTML = `<button class="buy-btn" style="width:100%; padding:15px; margin-bottom:5px;" onclick="buyBiz()">КУПИТЬ БИЗНЕС (1000 🪙)</button><p>Дает +5/с</p>`;
        }
        window.openTab('city');
    };

    window.buyBiz = () => {
        if(coins >= 1000) { 
            coins -= 1000; 
            income += 5; 
            updateUI(); 
            syncStats();
            alert("Куплено!"); 
        } else {
            alert("Недостаточно монет!");
        }
    };

    const randCard = () => Math.floor(Math.random()*10) + 2;
    const calcBJ = (arr) => arr.reduce((a,b)=>a+b, 0);

    window.startBJ = () => {
        let bet = Number(document.getElementById('bj-bet').value);
        if(bet > coins || bet <= 0) return alert("Мало денег!");
        coins -= bet;
        pCards = [randCard(), randCard()];
        dCards = [randCard()];
        updateBJUI(false);
        document.getElementById('bj-controls').innerHTML = `
            <button class="buy-btn" style="background:var(--blue); margin-right:5px;" onclick="hitBJ()">ВЗЯТЬ</button>
            <button class="buy-btn" style="background:var(--red)" onclick="standBJ()">ХВАТИТ</button>
        `;
        updateUI();
    };

    window.hitBJ = () => {
        pCards.push(randCard());
        if(calcBJ(pCards) > 21) endBJ("ПЕРЕБОР! Слив.");
        else updateBJUI(false);
    };

    window.standBJ = () => {
        while(calcBJ(dCards) < 17) dCards.push(randCard());
        let p = calcBJ(pCards), d = calcBJ(dCards);
        let bet = Number(document.getElementById('bj-bet').value);
        if(d > 21 || p > d) {
            coins += bet * 2;
            endBJ("ПОБЕДА!");
        } else if (p === d) {
            coins += bet;
            endBJ("НИЧЬЯ");
        } else endBJ("ДИЛЕР ВЫИГРАЛ");
    };

    function updateBJUI(showDealer) {
        document.getElementById('p-val').innerText = calcBJ(pCards);
        document.getElementById('d-val').innerText = showDealer ? calcBJ(dCards) : dCards[0];
    }

    function endBJ(txt) {
        updateBJUI(true);
        alert(txt);
        updateUI();
        syncStats();
        document.getElementById('bj-controls').innerHTML = `<button class="buy-btn" onclick="startBJ()">ИГРАТЬ ЕЩЕ</button>`;
    }

    // Старт
    initGame();
</script>

</body>
</html>
