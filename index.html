<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Burmalda: Admin Edition</title>
    <style>
        :root { --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c; --bg: #0a0a0a; --panel: #161616; --blue: #3498db; --purple: #9b59b6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; text-align: center; user-select: none; overflow: hidden; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: var(--panel); border-bottom: 2px solid #333; height: 75px; }
        .balance { font-size: 20px; color: var(--gold); font-weight: bold; }
        .energy-bar { width: 100px; height: 8px; background: #333; border-radius: 4px; margin-top: 5px; overflow: hidden; }
        .energy-fill { height: 100%; background: var(--green); transition: width 0.3s; }

        .tab-content { display: none; padding: 15px; height: calc(100vh - 165px); overflow-y: auto; padding-bottom: 80px; }
        .active-tab { display: block; }

        .click-btn { width: 150px; height: 150px; border-radius: 50%; border: 8px solid #222; background: radial-gradient(circle, var(--gold) 0%, #b8860b 100%); color: black; font-weight: 900; margin: 20px auto; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 0 20px rgba(241, 196, 15, 0.2); }
        .click-btn:active { transform: scale(0.95); }

        .list-item { background: #1a1a1a; padding: 12px; margin: 8px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--blue); }
        .buy-btn { background: var(--green); border: none; color: white; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        #chat-box { height: 250px; background: #000; border-radius: 10px; overflow-y: auto; padding: 10px; text-align: left; border: 1px solid #333; }
        .msg { margin-bottom: 6px; font-size: 13px; border-bottom: 1px solid #111; padding-bottom: 2px; }
        .msg b { color: var(--blue); cursor: pointer; }
        .prefix-admin { color: var(--red) !important; font-weight: bold; margin-right: 4px; }

        .nav { position: fixed; bottom: 0; width: 100%; background: var(--panel); display: flex; height: 75px; border-top: 2px solid #333; }
        .nav-btn { flex: 1; background: none; border: none; color: #555; font-size: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .nav-btn.active { color: var(--gold); }
        .nav-btn span { font-size: 22px; }

        .game-card { background: #111; padding: 15px; border-radius: 15px; border: 1px solid #333; margin-bottom: 15px; }
        .crash-val { font-size: 45px; color: var(--gold); font-family: monospace; margin: 15px 0; }
    </style>
</head>
<body onload="initGame()">

<div class="top-bar">
    <div style="text-align:left">
        <div class="balance"><span id="coins">0</span> 🪙</div>
        <div class="energy-bar"><div id="energy-fill" class="energy-fill" style="width: 100%;"></div></div>
        <div style="font-size:10px; color:#888; margin-top:2px;">Молния: <span id="energy-val">1000</span></div>
    </div>
    <div id="user-tag" style="font-size: 12px; color: var(--blue); font-weight: bold;">...</div>
    <button onclick="openTab('settings')" style="background:none; border:none; font-size:24px;">⚙️</button>
</div>

<div id="tab-clicker" class="tab-content active-tab">
    <div class="click-btn" onclick="makeClick()">БУРМАЛДА</div>
    <div style="background: #1a1a1a; padding: 10px; border-radius: 10px; display: inline-block;">
        Клик: <span id="clk-val">1</span> | Доход: <span id="inc-val">0</span>/с
    </div>
</div>

<div id="tab-map" class="tab-content">
    <h3>ГОРОДА</h3>
    <button class="list-item" style="width:100%" onclick="travelTo('Shop')">🏗️ МУРИНО (Магазин)</button>
    <button class="list-item" style="width:100%; border-left-color: var(--red);" onclick="travelTo('Casino')">🎰 ОТСО-СИТИ (Казино)</button>
</div>

<div id="tab-city" class="tab-content">
    <h3 id="city-title">ГОРОД</h3>
    <div id="city-ui"></div>
</div>

<div id="tab-chat" class="tab-content">
    <h3>ГЛОБАЛЬНЫЙ ЧАТ</h3>
    <div id="chat-box"></div>
    <div style="display:flex; gap:5px; margin-top:10px;">
        <input type="text" id="chat-input" placeholder="Сообщение..." style="flex:1; background:#222; border:1px solid #444; color:white; padding:12px; border-radius:8px;">
        <button class="buy-btn" onclick="sendMessage()" style="padding: 0 20px;">📡</button>
    </div>
</div>

<div id="tab-leaderboard" class="tab-content">
    <h3>🏆 ТОП ИГРОКОВ</h3>
    <div id="leader-list"></div>
</div>

<div id="tab-settings" class="tab-content">
    <h3>НАСТРОЙКИ</h3>
    <p>Твой ID (нажми для админки): <br><b id="my-id-display" onclick="tryAdmin()" style="color:var(--gold); cursor:pointer;"></b></p>
    <input type="text" id="name-input" placeholder="Новый ник..." style="background:#222; border:1px solid #444; color:white; padding:10px; border-radius:8px; width:80%;">
    <button class="buy-btn" onclick="changeNickname()" style="margin-top:10px;">СОХРАНИТЬ</button>
    <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
    <button style="background:var(--red); border:none; color:white; padding:10px; border-radius:8px; cursor:pointer;" onclick="resetGame()">СБРОС ПРОГРЕССА</button>
</div>

<div class="nav">
    <button class="nav-btn active" id="n-clicker" onclick="openTab('clicker')"><span>🖱️</span>Клик</button>
    <button class="nav-btn" id="n-map" onclick="openTab('map')"><span>🗺️</span>Карта</button>
    <button class="nav-btn" id="n-chat" onclick="openTab('chat')"><span>💬</span>Чат</button>
    <button class="nav-btn" id="n-leaderboard" onclick="openTab('leaderboard')"><span>🏆</span>Топ</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, query, orderByChild, limitToLast, push, serverTimestamp, get, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDI5JrmS9DTC6ZPf2IpeQi4Z8fe-eZeSi0",
        authDomain: "burmalda-cc9e2.firebaseapp.com",
        databaseURL: "https://burmalda-cc9e2-default-rtdb.firebaseio.com",
        projectId: "burmalda-cc9e2",
        storageBucket: "burmalda-cc9e2.firebasestorage.app",
        messagingSenderId: "16974087709",
        appId: "1:16974087709:web:98efe6ee803de73360e8f4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let State = {
        coins: Number(localStorage.getItem('coins')) || 0,
        income: Number(localStorage.getItem('income')) || 0,
        energy: Number(localStorage.getItem('energy')) || 1000,
        clickPower: Number(localStorage.getItem('clickPower')) || 1,
        userId: localStorage.getItem('burmalda_uid') || "User_" + Math.floor(Math.random()*9999),
        isAdmin: localStorage.getItem('burmalda_admin') === 'true'
    };

    const ITEMS = {
        cars: [ {n: "Жигули", p: 1000, i: 5, c: 2}, {n: "BMW M5", p: 15000, i: 50, c: 10} ],
        houses: [ {n: "Палатка", p: 500, i: 2}, {n: "Пентхаус", p: 100000, i: 1000} ]
    };

    window.initGame = () => {
        document.getElementById('user-tag').innerText = (State.isAdmin ? "[ADMIN] " : "") + State.userId;
        document.getElementById('my-id-display').innerText = State.userId;
        
        // Пассивный доход и энергия
        setInterval(() => {
            State.coins += State.income;
            if(State.energy < 1000) State.energy += 1;
            updateUI();
        }, 1000);

        setInterval(() => syncStats(), 20000);
        listenChat();
        listenLeaderboard();
        updateUI();
    };

    function updateUI() {
        document.getElementById('coins').innerText = Math.floor(State.coins).toLocaleString();
        document.getElementById('inc-val').innerText = State.income;
        document.getElementById('clk-val').innerText = State.clickPower;
        document.getElementById('energy-val').innerText = Math.floor(State.energy);
        document.getElementById('energy-fill').style.width = (State.energy / 10) + "%";
        
        localStorage.setItem('coins', State.coins);
        localStorage.setItem('energy', State.energy);
        localStorage.setItem('income', State.income);
        localStorage.setItem('clickPower', State.clickPower);
    }

    function syncStats() {
        set(ref(db, 'users/' + State.userId), { 
            username: State.userId, 
            balance: Math.floor(State.coins), 
            isAdmin: State.isAdmin,
            lastSeen: serverTimestamp() 
        });
    }

    window.makeClick = () => {
        if(State.energy >= 1) {
            State.energy -= 1;
            State.coins += State.clickPower;
            updateUI();
        }
    };

    window.openTab = (name) => {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + name).classList.add('active-tab');
        document.getElementById('n-' + name).classList.add('active');
    };

    window.travelTo = (loc) => {
        const ui = document.getElementById('city-ui');
        document.getElementById('city-title').innerText = loc === 'Shop' ? "МУРИНО" : "ОТСО-СИТИ";
        if(loc === 'Shop') {
            ui.innerHTML = `<h4>МАГАЗИН</h4>` + 
            ITEMS.cars.map((item, i) => `<div class="list-item"><span>${item.n} (+${item.i}/с)</span> <button class="buy-btn" onclick="buyItem('cars', ${i})">${item.p}</button></div>`).join('') +
            ITEMS.houses.map((item, i) => `<div class="list-item"><span>${item.n} (+${item.i}/с)</span> <button class="buy-btn" onclick="buyItem('houses', ${i})">${item.p}</button></div>`).join('');
        } else {
            ui.innerHTML = `
                <div class="game-card">
                    <h4>🚀 CRASH</h4>
                    <div class="crash-val" id="crash-mult">1.00x</div>
                    <button class="buy-btn" id="crash-btn" onclick="startCrash()">СТАВИТЬ 100</button>
                </div>
                <div class="game-card">
                    <h4>🃏 BLACKJACK</h4>
                    <p>Дилер: <span id="bj-dealer">?</span> | Вы: <span id="bj-player">0</span></p>
                    <button class="buy-btn" onclick="playBJ()">ИГРАТЬ (200 🪙)</button>
                </div>`;
        }
        window.openTab('city');
    };

    window.buyItem = (type, idx) => {
        const item = ITEMS[type][idx];
        if(State.coins >= item.p) {
            State.coins -= item.p;
            State.income += item.i;
            if(item.c) State.clickPower += item.c;
            updateUI(); alert("Куплено!");
        }
    };

    // GAMES
    let crashInt;
    window.startCrash = () => {
        if(State.coins < 100) return;
        State.coins -= 100;
        let m = 1.0; let boom = 1 + Math.random() * 4;
        document.getElementById('crash-btn').outerHTML = `<button class="buy-btn" id="crash-btn" style="background:var(--gold)" onclick="cashoutCrash(${m})">ЗАБРАТЬ</button>`;
        crashInt = setInterval(() => {
            m += 0.07;
            document.getElementById('crash-mult').innerText = m.toFixed(2) + "x";
            document.getElementById('crash-btn').onclick = () => cashoutCrash(m);
            if(m >= boom) { clearInterval(crashInt); document.getElementById('crash-mult').innerText = "BOOM!"; resetCrashBtn(); }
        }, 100);
    };

    function cashoutCrash(m) {
        clearInterval(crashInt);
        let win = Math.floor(100 * m);
        State.coins += win;
        alert("Выигрыш: " + win);
        resetCrashBtn();
        updateUI();
    }

    function resetCrashBtn() {
        document.getElementById('crash-btn').outerHTML = `<button class="buy-btn" id="crash-btn" onclick="startCrash()">СТАВИТЬ 100</button>`;
    }

    window.playBJ = () => {
        if(State.coins < 200) return;
        State.coins -= 200;
        let p = Math.floor(Math.random()*12) + 10;
        let d = Math.floor(Math.random()*10) + 12;
        document.getElementById('bj-player').innerText = p;
        document.getElementById('bj-dealer').innerText = d;
        if(p > d || d > 21) { State.coins += 400; alert("Победа!"); } else { alert("Проигрыш!"); }
        updateUI();
    };

    // ADMIN & CHAT
    window.tryAdmin = () => {
        let code = prompt("Введите код админа:");
        if(code === "BURMALDA2026") {
            State.isAdmin = true;
            localStorage.setItem('burmalda_admin', 'true');
            location.reload();
        }
    };

    window.sendMessage = () => {
        const inp = document.getElementById('chat-input');
        if(!inp.value.trim()) return;
        push(ref(db, 'chat'), {
            u: State.userId,
            t: inp.value,
            a: State.isAdmin,
            time: serverTimestamp()
        });
        inp.value = "";
    };

    function listenChat() {
        onValue(query(ref(db, 'chat'), limitToLast(20)), (snap) => {
            let h = "";
            snap.forEach(c => {
                const m = c.val();
                h += `<div class="msg">${m.a ? '<span class="prefix-admin">[ADMIN]</span>' : ''}<b>${m.u}</b>: ${m.t}</div>`;
            });
            document.getElementById('chat-box').innerHTML = h;
            document.getElementById('chat-box').scrollTop = 9999;
        });
    }

    function listenLeaderboard() {
        onValue(query(ref(db, 'users'), orderByChild('balance'), limitToLast(15)), (snap) => {
            let players = [];
            snap.forEach(s => players.push(s.val()));
            players.sort((a,b) => b.balance - a.balance);
            document.getElementById('leader-list').innerHTML = players.map((p, i) => `
                <div class="leader-item"><span>#${i+1} ${p.username}</span><b>${p.balance} 🪙</b></div>
            `).join('');
        });
    }

    window.changeNickname = () => {
        const n = document.getElementById('name-input').value.trim();
        if(n) { State.userId = n; localStorage.setItem('burmalda_uid', n); syncStats(); location.reload(); }
    };

    window.resetGame = () => { if(confirm("Удалить всё?")) { localStorage.clear(); location.reload(); } };
</script>

</body>
</html>
