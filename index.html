<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Burmalda: Leaderboard Edition</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDI5JrmS9DTC6ZPf2IpeQi4Z8fe-eZeSi0",
            authDomain: "burmalda-cc9e2.firebaseapp.com",
            databaseURL: "https://burmalda-cc9e2-default-rtdb.firebaseio.com",
            projectId: "burmalda-cc9e2",
            storageBucket: "burmalda-cc9e2.firebasestorage.app",
            messagingSenderId: "16974087709",
            appId: "1:16974087709:web:98efe6ee803de73360e8f4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.db = db; // Делаем доступным для игры
    </script>

    <style>
        :root { --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c; --bg: #0a0a0a; --panel: #161616; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; text-align: center; user-select: none; overflow: hidden; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: var(--panel); border-bottom: 2px solid #333; height: 60px; }
        .balance { font-size: 18px; color: var(--gold); font-weight: bold; }
        
        .tab-content { display: none; padding: 15px; height: calc(100vh - 150px); overflow-y: auto; padding-bottom: 80px; }
        .active-tab { display: block; }

        /* ЛИДЕРБОРД */
        .leader-item { display: flex; justify-content: space-between; padding: 10px; background: #222; margin-bottom: 5px; border-radius: 8px; border-left: 3px solid var(--gold); }
        .leader-item.me { border-color: var(--green); background: #2a2a2a; }

        .click-btn { width: 160px; height: 160px; border-radius: 50%; border: 10px solid #222; background: radial-gradient(circle, var(--gold) 0%, #b8860b 100%); color: black; font-weight: 900; margin-top: 30px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--panel); display: flex; height: 70px; border-top: 2px solid #333; }
        .nav-btn { flex: 1; background: none; border: none; color: #555; font-size: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .nav-btn.active { color: var(--gold); }
        .nav-btn span { font-size: 22px; }

        .menu-btn { background: #222; border: 1px solid #444; padding: 12px; border-radius: 10px; color: white; font-weight: bold; width: 100%; margin-bottom: 10px; }
        input { background: #222; color: white; border: 1px solid #444; padding: 10px; border-radius: 8px; width: 80%; text-align: center; }
    </style>
</head>
<body onload="initGame()">

<div class="top-bar">
    <div style="text-align:left">
        <div class="balance"><span id="coins">0</span> 🪙</div>
        <div style="font-size:12px; color:var(--green)">⚡ <span id="energy">1000</span></div>
    </div>
    <div id="user-tag" style="font-size: 12px; color: #888;">Загрузка...</div>
    <button onclick="openTab('settings')" style="background:none; border:none; font-size:22px;">⚙️</button>
</div>

<div id="tab-clicker" class="tab-content active-tab">
    <button class="click-btn" onclick="makeClick(event)">БУРМАЛДА</button>
    <p>Доход: <span id="inc-val">0</span>/с</p>
</div>

<div id="tab-map" class="tab-content">
    <h3>КАРТА</h3>
    <button class="menu-btn" onclick="travelTo('Murino')">🏗️ МУРИНО</button>
    <button class="menu-btn" onclick="travelTo('Otso')">🎰 ОТСО-СИТИ</button>
</div>

<div id="tab-city" class="tab-content">
    <h3 id="city-title">ГОРОД</h3>
    <div id="city-ui"></div>
</div>

<div id="tab-leaderboard" class="tab-content">
    <h3>🏆 ТОП БУРМАЛДЕРОВ</h3>
    <div id="leader-list">Загрузка рейтинга...</div>
</div>

<div id="tab-settings" class="tab-content">
    <h3>⚙️ НАСТРОЙКИ</h3>
    <p>Твой ID: <span id="my-id">?</span></p>
    <button class="menu-btn" style="color:var(--red)" onclick="resetGame()">СБРОС ПРОГРЕССА</button>
    <p>Введите промокод:</p>
    <input type="text" id="promo-input"><br><br>
    <button class="menu-btn" onclick="checkPromo()">OK</button>
</div>

<div class="nav">
    <button class="nav-btn active" id="n-clicker" onclick="openTab('clicker')"><span>🖱️</span>Клик</button>
    <button class="nav-btn" id="n-map" onclick="openTab('map')"><span>🗺️</span>Карта</button>
    <button class="nav-btn" id="n-city" onclick="openTab('city')"><span>🏙️</span>Город</button>
    <button class="nav-btn" id="n-leaderboard" onclick="openTab('leaderboard'); fetchLeaderboard();"><span>🏆</span>Топ</button>
</div>

<script type="module">
    // Импортируем нужные методы для работы внутри скрипта
    import { ref, set, onValue, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    let coins = 0, income = 0, energy = 1000, userId = "";
    
    // Генерация или получение ID игрока
    userId = localStorage.getItem('burmalda_uid') || "User_" + Math.floor(Math.random()*9000);
    localStorage.setItem('burmalda_uid', userId);
    document.getElementById('my-id').innerText = userId;
    document.getElementById('user-tag').innerText = userId;

    window.initGame = function() {
        let save = JSON.parse(localStorage.getItem('burmalda_save'));
        if(save) { coins = save.coins; income = save.income; }
        updateUI();
        
        setInterval(() => {
            coins += income;
            if(energy < 1000) energy++;
            updateUI();
        }, 1000);

        // Каждые 10 секунд отправляем данные в Firebase
        setInterval(saveToFirebase, 10000);
    };

    window.makeClick = function(e) {
        if(energy <= 0) return;
        coins += 1; energy--;
        updateUI();
    };

    function updateUI() {
        document.getElementById('coins').innerText = Math.floor(coins);
        document.getElementById('energy').innerText = energy;
        document.getElementById('inc-val').innerText = income;
        localStorage.setItem('burmalda_save', JSON.stringify({coins, income}));
    }

    // FIREBASE ЛОГИКА
    function saveToFirebase() {
        if(!window.db) return;
        set(ref(window.db, 'users/' + userId), {
            username: userId,
            balance: Math.floor(coins),
            lastActive: Date.now()
        });
    }

    window.fetchLeaderboard = function() {
        const leaderList = document.getElementById('leader-list');
        const topQuery = query(ref(window.db, 'users'), orderByChild('balance'), limitToLast(10));
        
        onValue(topQuery, (snapshot) => {
            let data = [];
            snapshot.forEach((child) => {
                data.push(child.val());
            });
            data.reverse(); // Чтобы самый богатый был сверху
            
            leaderList.innerHTML = data.map((user, index) => `
                <div class="leader-item ${user.username === userId ? 'me' : ''}">
                    <span>#${index + 1} ${user.username}</span>
                    <b>${user.balance.toLocaleString()} 🪙</b>
                </div>
            `).join('');
        });
    }

    window.openTab = function(name) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + name).classList.add('active-tab');
        document.getElementById('n-' + name).classList.add('active');
    }

    window.checkPromo = function() {
        if(document.getElementById('promo-input').value.toUpperCase() === 'INNT') {
            coins += 1000000; alert("Бонус 1 млн!"); updateUI();
        }
    }
</script>

</body>
</html>
