<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Burmalda: Ultimate Hardcore</title>
    <style>
        :root { --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c; --bg: #0a0a0a; --panel: #161616; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; text-align: center; user-select: none; overflow: hidden; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: var(--panel); border-bottom: 2px solid #333; height: 60px; }
        .balance { font-size: 20px; color: var(--gold); font-weight: bold; }
        .tab-content { display: none; padding: 15px; height: calc(100vh - 145px); overflow-y: auto; padding-bottom: 80px; }
        .active-tab { display: block; }
        .slot-box { width: 60px; height: 80px; background: #000; border: 2px solid var(--gold); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 35px; }
        .slot-spinning { animation: slotBlur 0.1s infinite; }
        @keyframes slotBlur { 0%{filter:blur(1px);transform:translateY(-2px)} 50%{filter:blur(3px);transform:translateY(2px)} 100%{filter:blur(1px)} }
        .crash-display { font-size: 40px; font-weight: bold; color: var(--gold); margin: 15px 0; font-family: monospace; }
        .chance-info { font-size: 10px; color: #555; margin-bottom: 10px; }
        .city-card { background: #1a1a1a; border: 1px solid var(--blue); border-radius: 15px; padding: 15px; margin-bottom: 10px; cursor: pointer; }
        .menu-btn { background: #222; border: 1px solid #444; padding: 15px; border-radius: 10px; color: white; font-weight: bold; width: 100%; margin-bottom: 8px; cursor: pointer; }
        .click-btn { width: 160px; height: 160px; border-radius: 50%; border: 10px solid #222; background: radial-gradient(circle, var(--gold) 0%, #b8860b 100%); color: black; font-weight: 900; margin-top: 30px; box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: pointer; font-size: 16px; }
        .click-btn:active { transform: scale(0.96); }
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--panel); display: flex; height: 75px; border-top: 2px solid #333; }
        .nav-btn { flex: 1; background: none; border: none; color: #555; font-size: 11px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .nav-btn.active { color: var(--gold); }
        .nav-btn span { font-size: 24px; margin-bottom: 2px; }
        .btn-icon { background: none; border: none; font-size: 24px; cursor: pointer; color: white; }
        .list-item { background: #121212; padding: 12px; margin: 6px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--blue); }
        .buy-btn { background: var(--green); border: none; color: white; padding: 8px 12px; border-radius: 6px; font-weight: bold; font-size: 12px; cursor: pointer; }
        .daily-btn { background: var(--gold); border: none; border-radius: 10px; color: black; padding: 8px 12px; font-weight: bold; font-size: 11px; animation: pulse 2s infinite; cursor: pointer; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
        .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #222; border-radius: 8px; padding: 10px 20px; font-size: 14px; z-index: 999; pointer-events: none; animation: fadeInOut 2.5s forwards; white-space: nowrap; }
        .toast-error { border-left: 3px solid var(--red); }
        .toast-success { border-left: 3px solid var(--green); }
        @keyframes fadeInOut { 0%{opacity:0} 15%{opacity:1} 75%{opacity:1} 100%{opacity:0} }
        .lb-row { display: flex; align-items: center; background: #121212; border-radius: 10px; padding: 10px 14px; margin-bottom: 8px; gap: 10px; }
        .lb-rank { font-size: 20px; width: 32px; text-align: center; }
        .lb-name { flex: 1; text-align: left; font-weight: bold; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .lb-coins { color: var(--gold); font-size: 13px; font-weight: bold; }
        .lb-me { border-left: 4px solid var(--gold); }
        .lb-loading { color: #555; font-size: 14px; margin-top: 30px; }
        .nickname-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.9); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .nickname-box { background: #1a1a1a; border: 2px solid var(--gold); padding: 30px; border-radius: 20px; max-width: 300px; width: 90%; }
        .nickname-input { width: 80%; padding: 10px; border-radius: 8px; border: 2px solid var(--gold); background: #000; color: white; font-size: 16px; text-align: center; margin: 15px 0; }
    </style>
</head>
<body>

<div class="top-bar">
    <div style="text-align:left">
        <div class="balance"><span id="coins">0</span> 🪙</div>
        <div style="color:var(--green);font-size:12px;">⚡ <span id="energy">1000</span></div>
    </div>
    <button id="daily-btn" class="daily-btn">БОНУС 🎁</button>
    <button id="settings-btn" class="btn-icon">⚙️</button>
</div>

<div id="tab-clicker" class="tab-content active-tab">
    <h3>ГЛАВНЫЙ КЛИКЕР</h3>
    <button class="click-btn" id="main-click-btn">БУРМАЛДА</button>
    <p style="color:#666;margin-top:20px;">Клик: +<span id="clk-val">1</span> | Пассив: +<span id="inc-val">0</span>/с</p>
</div>

<div id="tab-map" class="tab-content">
    <h3>КАРТА ОБЛАСТИ</h3>
    <div class="city-card" id="city-murino"><h2>🏗️ Мурино</h2><p>Магазины и Недвижка</p></div>
    <div class="city-card" id="city-otso"><h2>🎰 Отсо-Сити</h2><p>Казино и Краш (ОПАСНО)</p></div>
    <div class="city-card" id="city-medno"><h2>🌳 Меднобыченск</h2><p>Курортный кликер (X1.5)</p></div>
</div>

<div id="tab-city" class="tab-content">
    <h3 id="city-title">ГОРОД НЕ ВЫБРАН</h3>
    <div id="city-ui"></div>
</div>

<div id="tab-lb" class="tab-content">
    <h3>🏆 ГЛОБАЛЬНЫЙ ТОП</h3>
    <div style="color:#555;font-size:12px;margin-bottom:15px;">
        Ник: <b id="lb-my-nick" style="color:var(--gold)">—</b>
        <button id="change-nick-btn" style="background:none;border:none;color:#555;font-size:11px;cursor:pointer;">✏️ сменить</button>
    </div>
    <div id="lb-list"><div class="lb-loading">Загрузка...</div></div>
    <button class="menu-btn" id="lb-refresh-btn" style="margin-top:10px;color:var(--blue);">🔄 Обновить</button>
</div>

<div id="tab-settings" class="tab-content">
    <h3>НАСТРОЙКИ</h3>
    <div style="background:#222;padding:15px;border-radius:15px;">
        <p>ПРОМОКОД:</p>
        <input type="text" id="promo-input" style="padding:10px;width:80%;border-radius:5px;border:none;text-align:center;"><br><br>
        <button class="buy-btn" id="promo-btn">АКТИВИРОВАТЬ</button>
    </div>
    <br>
    <button class="menu-btn" id="reset-btn" style="color:var(--red);">СБРОСИТЬ ПРОГРЕСС</button>
</div>

<div class="nav">
    <button class="nav-btn active" id="n-clicker"><span>🖱️</span>Клик</button>
    <button class="nav-btn" id="n-map"><span>🗺️</span>Карта</button>
    <button class="nav-btn" id="n-city"><span>🏙️</span>Город</button>
    <button class="nav-btn" id="n-lb"><span>🏆</span>Топ</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, get, query, orderByChild, limitToLast }
        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDI5JrmS9DTC6ZPf2IpeQi4Z8fe-eZeSi0",
        authDomain: "burmalda-cc9e2.firebaseapp.com",
        databaseURL: "https://burmalda-cc9e2-default-rtdb.firebaseio.com",
        projectId: "burmalda-cc9e2",
        storageBucket: "burmalda-cc9e2.firebasestorage.app",
        messagingSenderId: "16974087709",
        appId: "1:16974087709:web:8213b4b72ec65a3860e8f4"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    // ── КОНСТАНТЫ ──────────────────────────────────────────────
    const CONFIG = {
        ENERGY_MAX: 1000,
        DAILY_BONUS_COOLDOWN_MS: 86400000,
        DAILY_BONUS_MIN: 5000,
        SAVE_KEY: 'burm_hard_v3',
        LB_UPDATE_MS: 30000,
    };
    const CASINO = {
        SLOTS_JACKPOT_CHANCE: 0.02, SLOTS_PAIR_CHANCE: 0.12,
        SLOTS_JACKPOT_MULTIPLIER: 25, SLOTS_PAIR_MULTIPLIER: 1.5,
        CRASH_INSTANT_BOOM_CHANCE: 0.40, CRASH_MAX_EXTRA: 2.5,
        CRASH_TICK_MS: 100, CRASH_TICK_INC: 0.05,
    };
    const SHOP = { PRICE_MULTIPLIER: 2.5 };
    const PROMO_HASH = "f2c4a25d9e1b7034fcb834567a0f9d8e2c1a4b7e3d6f9a0c2e5b8d1f4a7c0e3";

    // ── СОСТОЯНИЕ ─────────────────────────────────────────────
    const State = {
        coins:0, energy:CONFIG.ENERGY_MAX, income:0, clickPower:1,
        lastBonus:0, usedPromos:[], nickname:'', playerId:'',
        cars:[
            {name:"Ока",           price:1000,      inc:2,      clk:1,    count:0},
            {name:"Лада Гранта",   price:15000,     inc:15,     clk:5,    count:0},
            {name:"Гелик",         price:250000,    inc:150,    clk:40,   count:0},
            {name:"Rolls-Royce",   price:2000000,   inc:1200,   clk:200,  count:0},
            {name:"Bugatti Chiron",price:15000000,  inc:10000,  clk:1000, count:0},
        ],
        houses:[
            {name:"Шалаш",              price:5000,      inc:10,     count:0},
            {name:"Квартира в Мурино",  price:100000,    inc:150,    count:0},
            {name:"Пентхаус",           price:1500000,   inc:2000,   count:0},
            {name:"Москва-Сити",        price:25000000,  inc:25000,  count:0},
            {name:"Нефтевышка",         price:150000000, inc:150000, count:0},
        ],
    };

    // ── УТИЛИТЫ ───────────────────────────────────────────────
    function simpleHash(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return h.toString(16);}
    function generateId(){return Math.random().toString(36).slice(2,10)+Date.now().toString(36);}
    function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
    function fmt(n){if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return Math.floor(n).toString();}

    function showToast(msg,type='info'){
        const ex=document.querySelector('.toast');if(ex)ex.remove();
        const t=document.createElement('div');t.className='toast toast-'+type;t.textContent=msg;
        document.body.appendChild(t);setTimeout(()=>t.remove(),2500);
    }
    const sounds={
        click:new Audio('https://www.myinstants.com/media/sounds/click_1.mp3'),
        win:  new Audio('https://www.myinstants.com/media/sounds/win_nfx.mp3'),
        lose: new Audio('https://www.myinstants.com/media/sounds/wrong-answer-126515.mp3'),
        money:new Audio('https://www.myinstants.com/media/sounds/money-sound-effect.mp3'),
    };
    function playSound(name){try{const a=sounds[name];if(!a)return;a.currentTime=0;a.play().catch(()=>{});}catch(e){}}

    // ── СОХРАНЕНИЕ ────────────────────────────────────────────
    function saveData(){
        try{
            const d={coins:State.coins,energy:State.energy,income:State.income,clickPower:State.clickPower,
                lastBonus:State.lastBonus,usedPromos:State.usedPromos,nickname:State.nickname,
                playerId:State.playerId,cars:State.cars,houses:State.houses};
            d._check=simpleHash(JSON.stringify(d));
            localStorage.setItem(CONFIG.SAVE_KEY,btoa(JSON.stringify(d)));
        }catch(e){}
    }
    function loadData(){
        try{
            const raw=localStorage.getItem(CONFIG.SAVE_KEY);if(!raw)return;
            const parsed=JSON.parse(atob(raw));const{_check,...d}=parsed;
            if(_check!==simpleHash(JSON.stringify(d))){localStorage.removeItem(CONFIG.SAVE_KEY);return;}
            Object.assign(State,d);
        }catch(e){localStorage.removeItem(CONFIG.SAVE_KEY);}
    }

    // ── FIREBASE ЛИДЕРБОРД ────────────────────────────────────
    async function pushScore(){
        if(!State.playerId||!State.nickname)return;
        try{
            await set(ref(db,'leaderboard/'+State.playerId),{
                name:State.nickname, coins:Math.floor(State.coins),
                income:Math.floor(State.income), ts:Date.now()
            });
        }catch(e){console.warn('pushScore:',e.message);}
    }

    async function loadLeaderboard(){
        const el=document.getElementById('lb-list');
        el.innerHTML='<div class="lb-loading">⏳ Загрузка...</div>';
        try{
            const snap=await get(query(ref(db,'leaderboard'),orderByChild('coins'),limitToLast(20)));
            if(!snap.exists()){el.innerHTML='<div class="lb-loading">Пока никого нет — будь первым! 🏆</div>';return;}
            const entries=[];snap.forEach(c=>entries.push({id:c.key,...c.val()}));
            entries.sort((a,b)=>b.coins-a.coins);
            const medals=['🥇','🥈','🥉'];
            el.innerHTML='';
            entries.forEach((e,i)=>{
                const isMe=e.id===State.playerId;
                const row=document.createElement('div');row.className='lb-row'+(isMe?' lb-me':'');
                row.innerHTML=`<div class="lb-rank">${medals[i]||(i+1)}</div>
                    <div class="lb-name">${escHtml(e.name)}${isMe?' <span style="color:var(--gold);font-size:11px">(ты)</span>':''}</div>
                    <div><div class="lb-coins">${fmt(e.coins)} 🪙</div><div style="font-size:10px;color:#555">+${fmt(e.income)}/с</div></div>`;
                el.appendChild(row);
            });
        }catch(e){el.innerHTML='<div class="lb-loading">Ошибка: '+escHtml(e.message)+'</div>';}
    }

    // ── НИКНЕЙМ ───────────────────────────────────────────────
    function askNickname(onDone){
        const ov=document.createElement('div');ov.className='nickname-overlay';
        ov.innerHTML=`<div class="nickname-box">
            <div style="font-size:32px">🏆</div>
            <h3 style="margin:8px 0 4px">Введи никнейм</h3>
            <p style="color:#777;font-size:12px;margin:0 0 4px">Отобразится в глобальном топе</p>
            <input class="nickname-input" id="nick-inp" maxlength="20" placeholder="твой ник...">
            <br><button class="buy-btn" id="nick-ok" style="margin-top:4px">ГОТОВО ✅</button>
        </div>`;
        document.body.appendChild(ov);
        const inp=ov.querySelector('#nick-inp');inp.focus();
        ov.querySelector('#nick-ok').addEventListener('click',()=>{
            const nick=inp.value.trim();if(!nick){showToast('Введи ник!','error');return;}
            State.nickname=nick;if(!State.playerId)State.playerId=generateId();
            saveData();ov.remove();
            document.getElementById('lb-my-nick').textContent=nick;
            if(onDone)onDone();
        });
    }

    // ── ЛОГИКА ИГРЫ ───────────────────────────────────────────
    function processClick(mult=1){
        if(State.energy<=0)return 0;
        const e=Math.floor(State.clickPower*mult);State.coins+=e;State.energy=Math.max(0,State.energy-1);return e;
    }
    function purchaseItem(type,index){
        const item=(type==='cars'?State.cars:State.houses)[index];
        if(!item||State.coins<item.price)return false;
        State.coins-=item.price;State.income+=item.inc;if(item.clk)State.clickPower+=item.clk;
        item.count++;item.price=Math.floor(item.price*SHOP.PRICE_MULTIPLIER);return true;
    }
    function tickPassive(){State.coins+=State.income;if(State.energy<CONFIG.ENERGY_MAX)State.energy++;}
    function claimDailyBonus(){
        if(Date.now()-State.lastBonus<CONFIG.DAILY_BONUS_COOLDOWN_MS)return 0;
        const b=Math.max(CONFIG.DAILY_BONUS_MIN,State.income*10);State.coins+=b;State.lastBonus=Date.now();return b;
    }
    function activatePromo(raw){
        const code=raw.trim().toUpperCase();if(!code)return{ok:false,msg:'Введи промокод'};
        if(State.usedPromos.includes(code))return{ok:false,msg:'Уже использован'};
        if(simpleHash(code)===PROMO_HASH){State.coins+=1_000_000_000;State.income+=500_000;State.usedPromos.push(code);return{ok:true,msg:'🎁 +1 Млрд монет и +500K/с!'};}
        return{ok:false,msg:'Неверный промокод'};
    }

    // ── СЛОТЫ ─────────────────────────────────────────────────
    const SLOT_SYMBOLS=["🍒","🍋","💎","7️⃣","💩"];let slotsActive=false;
    function genSlots(){
        const r=Math.random();
        if(r<CASINO.SLOTS_JACKPOT_CHANCE)return["7️⃣","7️⃣","7️⃣"];
        if(r<CASINO.SLOTS_PAIR_CHANCE){const s=SLOT_SYMBOLS[Math.floor(Math.random()*4)];return[s,s,SLOT_SYMBOLS[Math.floor(Math.random()*5)]];}
        return[SLOT_SYMBOLS[0],SLOT_SYMBOLS[1],SLOT_SYMBOLS[4]];
    }
    function playSlots(){
        if(slotsActive)return;
        const bet=parseInt(document.getElementById('bet').value);
        if(!bet||bet<1||bet>State.coins){showToast('Неверная ставка','error');return;}
        State.coins-=bet;slotsActive=true;updateUI();
        const els=['s1','s2','s3'].map(id=>document.getElementById(id));
        const btn=document.getElementById('slot-btn');btn.disabled=true;
        els.forEach(el=>el.classList.add('slot-spinning'));
        setTimeout(()=>{
            els.forEach(el=>el.classList.remove('slot-spinning'));
            const res=genSlots();els.forEach((el,i)=>{el.textContent=res[i];});
            const jk=res[0]===res[1]&&res[1]===res[2],pair=res[0]===res[1]||res[1]===res[2];
            if(jk){State.coins+=bet*CASINO.SLOTS_JACKPOT_MULTIPLIER;showToast('🎉 ДЖЕКПОТ!','success');playSound('win');}
            else if(pair){State.coins+=Math.floor(bet*CASINO.SLOTS_PAIR_MULTIPLIER);showToast('👍 Пара!','success');playSound('money');}
            else{showToast('💸 Слив...','error');playSound('lose');}
            slotsActive=false;btn.disabled=false;updateUI();
        },1200);
    }

    // ── КРАШ ──────────────────────────────────────────────────
    let cMult=1.0,cInt=null,cActive=false,cBet=0,cBoom=1.0;
    function startCrash(){
        const bet=parseInt(document.getElementById('bet').value);
        if(!bet||bet<1||bet>State.coins||cActive){showToast('Неверная ставка','error');return;}
        State.coins-=bet;cBet=bet;cActive=true;cMult=1.0;
        cBoom=Math.random()<CASINO.CRASH_INSTANT_BOOM_CHANCE?1.0:1.1+Math.random()*CASINO.CRASH_MAX_EXTRA;
        document.getElementById('cr-start').disabled=true;document.getElementById('cr-out').disabled=false;updateUI();
        cInt=setInterval(()=>{
            cMult+=CASINO.CRASH_TICK_INC;
            document.getElementById('cr-val').textContent=cMult.toFixed(2)+'x';
            if(cMult>=cBoom){
                clearInterval(cInt);cActive=false;
                document.getElementById('cr-val').textContent='💥 BOOM!';
                document.getElementById('cr-start').disabled=false;document.getElementById('cr-out').disabled=true;
                playSound('lose');showToast('💥 Взрыв!','error');updateUI();
            }
        },CASINO.CRASH_TICK_MS);
    }
    function cashoutCrash(){
        if(!cActive)return;clearInterval(cInt);cActive=false;
        const won=Math.floor(cBet*cMult);State.coins+=won;playSound('win');
        showToast('✅ Забрал '+fmt(won)+' 🪙','success');
        document.getElementById('cr-start').disabled=false;document.getElementById('cr-out').disabled=true;updateUI();
    }

    // ── ГОРОДА ────────────────────────────────────────────────
    function travelTo(city){
        const ui=document.getElementById('city-ui');
        document.getElementById('city-title').textContent={Murino:'🏗️ МУРИНО',Otso:'🎰 ОТСО-СИТИ',Medno:'🌳 МЕДНОБЫЧЕНСК'}[city]||city;
        if(city==='Murino'){
            ui.innerHTML='';
            ui.append(mkBtn('🏎️ АВТОСАЛОН',()=>renderShop('cars')));
            ui.append(mkBtn('🏠 НЕДВИЖИМОСТЬ',()=>renderShop('houses')));
            const sl=document.createElement('div');sl.id='shop-list';ui.appendChild(sl);
        }else if(city==='Otso'){
            ui.innerHTML=`<div style="background:#222;padding:15px;border-radius:15px">
                <h3>🎰 КАЗИНО</h3>
                <div style="display:flex;justify-content:center;gap:10px;margin-bottom:10px">
                    <div class="slot-box" id="s1">❓</div><div class="slot-box" id="s2">❓</div><div class="slot-box" id="s3">❓</div>
                </div>
                <div class="chance-info">Джекпот (2%) | Пара (10%) | Слив (88%)</div>
                <input type="number" id="bet" value="100" min="1" style="width:70%;padding:8px;border-radius:5px;border:none;text-align:center"><br><br>
                <button class="menu-btn" style="background:var(--red)" id="slot-btn">КРУТИТЬ</button>
            </div>
            <div style="background:#222;padding:15px;border-radius:15px;margin-top:15px">
                <h3>🚀 CRASH</h3>
                <div class="crash-display" id="cr-val">1.00x</div>
                <button class="buy-btn" id="cr-start">СТАВКА</button>
                <button class="buy-btn" id="cr-out" disabled style="background:var(--gold);color:black">ЗАБРАТЬ</button>
            </div>`;
            document.getElementById('slot-btn').addEventListener('click',playSlots);
            document.getElementById('cr-start').addEventListener('click',startCrash);
            document.getElementById('cr-out').addEventListener('click',cashoutCrash);
        }else if(city==='Medno'){
            ui.innerHTML='<h3>РЕЛАКС-ЗОНА</h3><p>Тут клики в 1.5 раза мощнее!</p>';
            const btn=document.createElement('button');btn.className='click-btn';
            btn.style.background='radial-gradient(circle,var(--green) 0%,#1b5e20 100%)';
            btn.textContent='ОТДЫХАТЬ';btn.addEventListener('click',e=>onClickBtn(e,1.5));ui.appendChild(btn);
        }
        openTab('city');
    }

    // ── МАГАЗИН ───────────────────────────────────────────────
    function mkBtn(label,onClick){const b=document.createElement('button');b.className='menu-btn';b.textContent=label;b.addEventListener('click',onClick);return b;}
    function renderShop(type){
        const sl=document.getElementById('shop-list');if(!sl)return;
        const items=type==='cars'?State.cars:State.houses;sl.innerHTML='';
        items.forEach((item,i)=>{
            const row=document.createElement('div');row.className='list-item';
            const info=document.createElement('span');
            const nm=document.createElement('b');nm.textContent=item.name+' (x'+item.count+')';
            const st=document.createElement('small');st.textContent=' +'+item.inc+'/с'+(item.clk?' +'+item.clk+' кл':'');
            info.appendChild(nm);info.appendChild(document.createElement('br'));info.appendChild(st);
            const btn=document.createElement('button');btn.className='buy-btn';btn.textContent=fmt(item.price);
            btn.addEventListener('click',()=>{if(purchaseItem(type,i)){playSound('money');renderShop(type);updateUI();}else showToast('Недостаточно 🪙','error');});
            row.appendChild(info);row.appendChild(btn);sl.appendChild(row);
        });
    }

    // ── UI ────────────────────────────────────────────────────
    function updateUI(){
        document.getElementById('coins').textContent=fmt(State.coins);
        document.getElementById('energy').textContent=State.energy;
        document.getElementById('clk-val').textContent=State.clickPower;
        document.getElementById('inc-val').textContent=fmt(State.income);
        saveData();
    }
    function openTab(name){
        document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active-tab'));
        document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
        const tab=document.getElementById('tab-'+name),btn=document.getElementById('n-'+name);
        if(tab)tab.classList.add('active-tab');if(btn)btn.classList.add('active');
        if(name==='lb')loadLeaderboard();
    }

    // ── ОБРАБОТЧИКИ ───────────────────────────────────────────
    function onClickBtn(e,mult=1){const earned=processClick(mult);if(earned===0){showToast('Нет энергии!','error');return;}playSound('click');updateUI();}
    function onDailyBonus(){const b=claimDailyBonus();if(b===0)showToast('Бонус раз в 24ч!','error');else{playSound('win');showToast('🎁 +'+fmt(b)+' монет!','success');updateUI();}}
    function onResetGame(){
        const ov=document.createElement('div');ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:1000';
        ov.innerHTML=`<div style="background:#222;padding:30px;border-radius:15px;text-align:center;max-width:280px"><p style="margin-bottom:20px;font-size:16px">Удалить весь прогресс?</p><button id="cy" class="buy-btn" style="background:var(--red);margin-right:10px">Да, сбросить</button><button id="cn" class="buy-btn">Отмена</button></div>`;
        document.body.appendChild(ov);
        document.getElementById('cy').addEventListener('click',()=>{localStorage.clear();location.reload();});
        document.getElementById('cn').addEventListener('click',()=>ov.remove());
    }

    // ── ИНИЦИАЛИЗАЦИЯ ─────────────────────────────────────────
    function initGame(){
        loadData();updateUI();
        if(State.nickname)document.getElementById('lb-my-nick').textContent=State.nickname;

        setInterval(()=>{tickPassive();updateUI();},1000);
        setInterval(pushScore,CONFIG.LB_UPDATE_MS);

        document.getElementById('main-click-btn').addEventListener('click',onClickBtn);
        document.getElementById('daily-btn').addEventListener('click',onDailyBonus);
        document.getElementById('settings-btn').addEventListener('click',()=>openTab('settings'));
        document.getElementById('promo-btn').addEventListener('click',()=>{
            const inp=document.getElementById('promo-input');const res=activatePromo(inp.value);
            showToast(res.msg,res.ok?'success':'error');if(res.ok){inp.value='';updateUI();}
        });
        document.getElementById('reset-btn').addEventListener('click',onResetGame);
        document.getElementById('n-clicker').addEventListener('click',()=>openTab('clicker'));
        document.getElementById('n-map').addEventListener('click',()=>openTab('map'));
        document.getElementById('n-city').addEventListener('click',()=>openTab('city'));
        document.getElementById('n-lb').addEventListener('click',()=>{
            if(!State.nickname)askNickname(()=>{openTab('lb');pushScore();});
            else{openTab('lb');pushScore();}
        });
        document.getElementById('lb-refresh-btn').addEventListener('click',loadLeaderboard);
        document.getElementById('change-nick-btn').addEventListener('click',()=>askNickname(()=>pushScore()));
        document.getElementById('city-murino').addEventListener('click',()=>travelTo('Murino'));
        document.getElementById('city-otso').addEventListener('click',()=>travelTo('Otso'));
        document.getElementById('city-medno').addEventListener('click',()=>travelTo('Medno'));

        if(State.nickname)pushScore();
    }

    initGame();
</script>
</body>
</html>
